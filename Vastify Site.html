function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.replace(/^#/, '') || '/');
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash.replace(/^#/, '') || '/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return [route];
}

function AnimatedCounter({ to, duration = 2.5, prefix = "", suffix = "", className = "" }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    const controls = animate(0, to, {
      duration, ease: [0.16, 1, 0.3, 1],
      onUpdate: v => setVal(v),
    });
    return () => controls.stop();
  }, [to, duration]);
  return <span className={className}>{prefix}{Math.round(val).toLocaleString()}{suffix}</span>;
}

function Calculator() {

    <section className="relative border-y border-slate-900 bg-slate-950">
      <div className="max-w-7xl mx-auto px-6 py-20">

          <div className="flex items-end justify-between flex-wrap gap-4 mb-6">
            <div>

            </div>
            <div className="text-right">

              </div>
              <div className="mt-3 font-mono text-3xl md:text-4xl text-slate-200">
                ${Math.round(sf).toLocaleString()}<span className="text-slate-500 text-base">/mo</span>

    { q: "Vastify let us offer a 'cut your Salesforce bill in half' promise and actually keep it. Our close rate on renewals jumped 22%.", a: "Priya Shah", r: "Managing Partner, Altus Cloud Systems" },
    { q: "We white-labeled the dashboard in two weeks. Our customers don't know it isn't ours — and we don't miss the engineering cost.", a: "Marcus Leduc", r: "CTO, Northwave ISV" },
    { q: "The rev share is the most honest I've seen in this space. Paid on time, monthly, no clawbacks after month two.", a: "Sofia Reyes", r: "Channel Lead, BrightArrow Consulting" },
  ];
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(v => (v + 1) % quotes.length), 5500);
    return () => clearInterval(t);
  }, []);
  return (
    <section className="relative">
      <div className="max-w-4xl mx-auto px-6 py-20 text-center">
        <div className="text-xs uppercase tracking-[0.18em] text-brand-300 font-medium">What partners say</div>
        <div className="relative h-[260px] md:h-[220px] mt-6">
          <AnimatePresence mode="wait">
            <motion.div key={i}
              initial={{ opacity: 0, y: 12 }} animate={{ opacity: 1, y: 0 }}
              exit={{ opacity: 0, y: -12 }} transition={{ duration: 0.6 }}
              className="absolute inset-0 flex flex-col items-center justify-center">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" className="text-brand-400 mb-5"><path d="M7 11a4 4 0 0 1 4-4V5a6 6 0 0 0-6 6v8h6v-8H7zm10 0a4 4 0 0 1 4-4V5a6 6 0 0 0-6 6v8h6v-8h-4z"/></svg>
              <blockquote className="text-xl md:text-2xl text-slate-100 leading-relaxed max-w-3xl font-medium">"{quotes[i].q}"</blockquote>
              <div className="mt-6 text-sm text-slate-400">
                <span className="text-slate-200 font-medium">{quotes[i].a}</span> · {quotes[i].r}
              </div>
            </motion.div>
          </AnimatePresence>
        </div>
        <div className="flex justify-center gap-2">
          {quotes.map((_, idx) => (
            <button key={idx} onClick={() => setI(idx)} className={`h-1.5 rounded-full transition-all ${idx===i ? 'bg-brand-500 w-8' : 'bg-slate-700 hover:bg-slate-600 w-3'}`} />
          ))}
        </div>
      </div>
    </section>
  );
}

function Partners() {
  return (
    <div className="min-h-screen">
      <PartnersHero/>
      <PartnerTiers/>
      <PartnerApplication/>
      <PartnerTestimonials/>
      <Footer/>
    </div>
  );
}

function App() {
  const [route] = useHashRoute();
  useEffect(() => { window.scrollTo({ top: 0 }); }, [route]);
  return (
    <div className="min-h-screen bg-slate-950 text-slate-100">
      <TopNav route={route} />
      {route === '/partners' ? <Partners/> : <Landing/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
