services:
  minio:
    image: minio/minio:latest
    container_name: vastify-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: vastify
      MINIO_ROOT_PASSWORD: vastifydev
    volumes:
      - ./.minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: vastify-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vastify vastifydev;
      mc mb -p local/vastify-demo || true;
      mc anonymous set download local/vastify-demo || true;
      exit 0;
      "

  app:
    build: .
    container_name: vastify-app
    ports:
      - "3001:3000"
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_PATH: /data/vastify.db
      BACKUP_GIT_DATA_DIR: /data/git
      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: vastify
      MINIO_SECRET_KEY: vastifydev
      MINIO_BUCKET: vastify-demo
      SF_REDIRECT_URI: http://localhost:3001/auth/salesforce/callback
      DEMO_TENANT_API_KEY: vastify_demo_key_change_me
    volumes:
      - vastify-data:/data
    restart: unless-stopped

volumes:
  vastify-data:
