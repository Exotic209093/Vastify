services:
  minio:
    image: minio/minio:latest
    container_name: vastify-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: vastify
      MINIO_ROOT_PASSWORD: vastifydev
    volumes:
      - ./.minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: vastify-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vastify vastifydev;
      mc mb -p local/vastify-demo || true;
      mc anonymous set download local/vastify-demo || true;
      exit 0;
      "
